name: "JS - Next.js Build"
description: "Build Next.js with .next/cache caching for incremental compilation"

inputs:
  build-env:
    description: "Extra env vars for build (KEY=VALUE, one per line)"
    required: false
    default: ""
  working-directory:
    description: "Working directory"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Detect package manager
      id: pm
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f "pnpm-lock.yaml" ]; then
          echo "lockfile=pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
          echo "run=pnpm run build" >> "$GITHUB_OUTPUT"
        elif [ -f "yarn.lock" ]; then
          echo "lockfile=yarn.lock" >> "$GITHUB_OUTPUT"
          echo "run=yarn build" >> "$GITHUB_OUTPUT"
        elif [ -f "package-lock.json" ]; then
          echo "lockfile=package-lock.json" >> "$GITHUB_OUTPUT"
          echo "run=npm run build" >> "$GITHUB_OUTPUT"
        else
          echo "::error::No lockfile found"
          exit 1
        fi

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working-directory }}/.next/cache
        key: nextjs-${{ runner.os }}-${{ hashFiles(format('{0}/{1}', inputs.working-directory, steps.pm.outputs.lockfile)) }}-${{ github.sha }}
        restore-keys: |
          nextjs-${{ runner.os }}-${{ hashFiles(format('{0}/{1}', inputs.working-directory, steps.pm.outputs.lockfile)) }}-
          nextjs-${{ runner.os }}-

    - name: Build Next.js
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: "1"
      run: |
        if [ -n "${{ inputs.build-env }}" ]; then
          while IFS= read -r line; do
            [ -n "$line" ] && export "$line"
          done <<< "${{ inputs.build-env }}"
        fi
        ${{ steps.pm.outputs.run }}
