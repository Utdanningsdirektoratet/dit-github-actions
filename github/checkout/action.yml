name: "GitHub - Checkout"
description: "Checkout repository (wraps actions/checkout)"

inputs:
  ref:
    description: "Branch, tag, or SHA to checkout"
    required: false
    default: ""
  fetch-depth:
    description: "Number of commits to fetch (0 for full history)"
    required: false
    default: "1"
  submodules:
    description: "Checkout submodules (true, false, recursive)"
    required: false
    default: "false"
  token:
    description: "PAT or GitHub token for private repos"
    required: false
    default: ${{ github.token }}
  path:
    description: "Relative path under $GITHUB_WORKSPACE to place the repository"
    required: false
    default: ""
  lfs:
    description: "Download Git LFS files"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ inputs.fetch-depth }}
        submodules: ${{ inputs.submodules }}
        token: ${{ inputs.token }}
        path: ${{ inputs.path }}
        lfs: ${{ inputs.lfs }}
