name: 'DotNet Install'
description: 'Restore NuGet packages with caching'

inputs:
  working-directory:
    description: 'Directory containing the .NET solution or project'
    required: false
    default: '.'
  nuget-config:
    description: 'Path to nuget.config (empty = default NuGet behavior)'
    required: false
    default: ''

outputs:
  cache-hit:
    description: 'Whether the NuGet cache was restored'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Cache NuGet packages
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ env.NUGET_PACKAGES || '~/.nuget/packages' }}
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.config', '**/nuget.config') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Restore NuGet packages
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NUGET_CONFIG: ${{ inputs.nuget-config }}
      run: |
        ARGS=""
        if [ -n "$NUGET_CONFIG" ]; then
          ARGS="--configfile $NUGET_CONFIG"
        fi
        dotnet restore $ARGS
